spring:
  profiles:
    active: local
  application:
    name: KPL-APP
  servlet:
    multipart:
      max-file-size: 1500MB
      max-request-size: 1500MB
  jpa:
    properties:
      hibernate:
        session_factory:
          statement_inspector: com.kpl.registration.Audit.AuditSqlStatementInspector
      org:
        hibernate:
          envers:
            audit_table_suffix: _aud

# Server-side page rendering has been removed; this service now exposes API endpoints only.
logging:
  level:
    root: INFO
    com.kpl.registration: INFO
    org.springframework.web: WARN
